<script>
    // Toggle the main dropdown menu
    function toggleMenu() {
        const menu = document.getElementById("menu");
        menu.classList.toggle("visible");
    }

    // Toggle the submenu inside Galleries
    function toggleSubmenu(event) {
        const submenu = document.getElementById("submenu");
        submenu.classList.toggle("hidden");
        event.stopPropagation(); // Prevents the parent menu from closing
    }

    // Close the menu when clicking outside
    window.onclick = function(event) {
        if (!event.target.matches('.menu-icon') && !event.target.matches('.dropdown a')) {
            const menus = document.querySelectorAll("#menu, .submenu");
            menus.forEach(menu => {
                if (menu.classList.contains("visible")) {
                    menu.classList.remove("visible");
                }
            });
        }
    };
</script>
